name: Multi-Platform Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Itt adjuk meg a három operációs rendszert
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      # A -G "Unix Makefiles" csak Linuxon és Macen kell, Windowson hagyjuk az alapértelmezettet
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TerminalJack-${{ matrix.os }}
        path: |
          build/Blackjack
          build/Blackjack.exe
          build/Release/Blackjack.exe
        if-no-files-found: error
